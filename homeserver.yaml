server_name: "sub.yourdomain.com" # this will show your server/domain you entered in the compose file
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:  # replace with postgres
  name: psycopg2
  txn_limit: 10000
  args:
    user: synapse
    password: password # make a complex and unguessable password and matches the password in compose file
    database: synapse
    host: container_name_of_postgres # make sure you use the name of the container of postgres for this value
    port: 5432
    cp_min: 5
    cp_max: 10
log_config: "/data/sub.yourdomain.com.log.config" # this will show your server/domain you entered in the compose file
media_store_path: /data/media_store
